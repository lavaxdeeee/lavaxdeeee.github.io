<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>goat hq</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0a0c10">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🐐%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0c10; --panel:rgba(255,255,255,.035); --line:rgba(255,255,255,.09);
    --text:#ece8de; --dim:#9b968a; --gold:#e8b64c;
    --pixel:"Pixelify Sans",ui-monospace,monospace;
    --body:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased}
  ::selection{background:var(--gold);color:#14100a}
  :focus-visible{outline:2px dashed var(--gold);outline-offset:3px;border-radius:6px}
  .wrap{width:100%;max-width:560px}

  /* ---------- the gate ---------- */
  #gate{display:flex;flex-direction:column;gap:12px;align-items:center;text-align:center;
    background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:38px 28px}
  #gate .glogo{font-size:52px}
  #gate label{font-family:var(--pixel);font-size:15px;color:var(--dim);letter-spacing:2px}
  #pw{width:100%;max-width:280px;background:#101218;border:1px solid var(--line);border-radius:10px;
    color:var(--text);font-family:var(--pixel);font-size:18px;text-align:center;padding:11px}
  #pw:focus{border-color:var(--gold);outline:none}
  #gate button{font-family:var(--pixel);font-size:15px;color:#14100a;background:var(--gold);
    border:none;border-radius:10px;padding:10px 24px;cursor:pointer}
  #gate button:hover{background:#f2c96a}
  #gateMsg{font-family:var(--pixel);font-size:14px;color:#f8b4b4;min-height:20px}
  #gate.no{animation:shake .35s ease}
  @keyframes shake{20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(3px)}}

  /* ---------- the hq ---------- */
  #hq{text-align:center}
  #greet{font-family:var(--pixel);font-weight:700;font-size:clamp(30px,7vw,44px);color:var(--gold)}
  #bigClock{font-family:var(--pixel);font-size:clamp(46px,12vw,76px);letter-spacing:2px;margin-top:16px}
  #bigDate{font-family:var(--pixel);font-size:16px;color:var(--dim);margin-top:4px}
  .wx{margin-top:26px;background:var(--panel);border:1px solid var(--line);border-radius:16px;
    padding:18px;font-family:var(--pixel);font-size:16px;line-height:2;color:var(--text)}
  .wx .big{font-size:30px}
  .wx .dim{color:var(--dim);font-size:13px}
  .stuff{margin-top:26px;text-align:left}
  #lock{margin-top:30px;font-family:var(--pixel);font-size:13px;color:var(--dim);background:none;
    border:1px solid var(--line);border-radius:999px;padding:8px 16px;cursor:pointer}
  #lock:hover{color:var(--gold);border-color:var(--gold)}
</style>
</head>
<body>
<div class="wrap">

  <form id="gate">
    <div class="glogo">🐐</div>
    <label for="pw">password</label>
    <input id="pw" type="password" autocomplete="off" autofocus>
    <button type="submit">enter</button>
    <div id="gateMsg"></div>
  </form>

  <main id="hq" hidden>
    <h1 id="greet"></h1>
    <div id="bigClock">--:--:--</div>
    <div id="bigDate"></div>
    <div class="wx" id="wx">checking the sky over adelaide…</div>

    <section class="stuff">
      <!-- ✏️ Tyler: your personal stuff goes here.
           Anything you put inside this <section> only shows after the gate.
           (Reminder: this is a casual client-side lock, not a bank vault —
           don't put truly sensitive things in a public static site.) -->
    </section>

    <button id="lock">lock up 🔒</button>
  </main>

</div>

<script>
'use strict';
const $ = s => document.querySelector(s);
const TZ = 'Australia/Adelaide';
const KEY = 'gy_hq_open';
// sha-256 of the password — the plaintext never appears in this file
const HASH = 'dde34da6e5bf9d46f07f1641aa939c55189180a3c7bc22aeac4ba40f7e288099';

async function sha256(text){
  const d = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return [...new Uint8Array(d)].map(b => b.toString(16).padStart(2, '0')).join('');
}

/* ---------- gate ---------- */
$('#gate').addEventListener('submit', async e => {
  e.preventDefault();
  let ok = false;
  try { ok = (await sha256($('#pw').value)) === HASH; } catch(err){
    $('#gateMsg').textContent = 'this page needs https (or localhost) to unlock';
    return;
  }
  if (ok){
    try { localStorage.setItem(KEY, 'yes'); } catch(err){}
    unlock();
  } else {
    $('#pw').value = '';
    $('#gateMsg').textContent = 'baa. nope.';
    const g = $('#gate');
    g.classList.remove('no'); void g.offsetWidth; g.classList.add('no');
  }
});
$('#lock').addEventListener('click', () => {
  try { localStorage.removeItem(KEY); } catch(err){}
  location.reload();
});

function unlock(){
  $('#gate').hidden = true;
  $('#hq').hidden = false;
  greet(); tick(); setInterval(tick, 1000);
  weather();
}
try { if (localStorage.getItem(KEY) === 'yes') unlock(); } catch(err){}

/* ---------- greeting + clock ---------- */
function adelaideHour(){
  return +new Intl.DateTimeFormat('en-AU', { hour:'numeric', hour12:false, timeZone:TZ }).format(new Date());
}
function greet(){
  const h = adelaideHour();
  $('#greet').textContent =
    h < 5  ? 'late one, tyler? 🌙' :
    h < 12 ? "morning, tyler ☀️" :
    h < 18 ? "g'day tyler 👋" :
             'evening, tyler 🌆';
}
function tick(){
  const now = new Date();
  $('#bigClock').textContent = new Intl.DateTimeFormat('en-AU',
    { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false, timeZone:TZ }).format(now);
  $('#bigDate').textContent = new Intl.DateTimeFormat('en-AU',
    { weekday:'long', day:'numeric', month:'long', year:'numeric', timeZone:TZ }).format(now).toLowerCase() + ' · adelaide';
}

/* ---------- weather (open-meteo, no key needed) ---------- */
const WMO = {
  0:['☀️','clear'],1:['🌤️','mostly clear'],2:['⛅','partly cloudy'],3:['☁️','overcast'],
  45:['🌫️','foggy'],48:['🌫️','icy fog'],
  51:['🌦️','light drizzle'],53:['🌦️','drizzle'],55:['🌧️','heavy drizzle'],
  61:['🌧️','light rain'],63:['🌧️','rain'],65:['🌧️','heavy rain'],66:['🌧️','freezing rain'],67:['🌧️','freezing rain'],
  71:['🌨️','light snow'],73:['🌨️','snow'],75:['❄️','heavy snow'],77:['❄️','snow grains'],
  80:['🌦️','light showers'],81:['🌧️','showers'],82:['⛈️','heavy showers'],85:['🌨️','snow showers'],86:['🌨️','snow showers'],
  95:['⛈️','thunderstorm'],96:['⛈️','storm + hail'],99:['⛈️','storm + hail'],
};
async function weather(){
  try {
    const url = 'https://api.open-meteo.com/v1/forecast?latitude=-34.9285&longitude=138.6007'
      + '&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,relative_humidity_2m'
      + '&daily=temperature_2m_max,temperature_2m_min&forecast_days=1&timezone=' + encodeURIComponent(TZ);
    const res = await fetch(url);
    if (!res.ok) throw new Error(res.status);
    const j = await res.json();
    const c = j.current, [emoji, label] = WMO[c.weather_code] || ['🐐','weather doing its own thing'];
    $('#wx').innerHTML =
      `<span class="big">${emoji} ${Math.round(c.temperature_2m)}°C</span> ${label}<br>` +
      `<span class="dim">feels like ${Math.round(c.apparent_temperature)}° · ` +
      `wind ${Math.round(c.wind_speed_10m)} km/h · humidity ${c.relative_humidity_2m}% · ` +
      `today ${Math.round(j.daily.temperature_2m_min[0])}° → ${Math.round(j.daily.temperature_2m_max[0])}°</span>`;
  } catch(err){
    $('#wx').textContent = "the weather's hiding — couldn't reach open-meteo 🌫️";
  }
}
</script>
</body>
</html>
