<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 — this goat wandered off</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🐐%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
<style>
  body{
    background:#0a0c10;color:#ece8de;font-family:"Pixelify Sans",ui-monospace,monospace;
    min-height:100vh;margin:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;gap:14px;padding:24px;
  }
  .goat{font-size:74px;transform:scaleX(-1);animation:wander 5s ease-in-out infinite alternate}
  @keyframes wander{to{transform:scaleX(-1) translateX(-40px)}}
  h1{font-size:clamp(38px,8vw,64px);margin:0;color:#e8b64c}
  p{color:#9b968a;font-size:18px;margin:0;line-height:1.6}
  a{
    color:#0a0c10;background:#e8b64c;text-decoration:none;font-size:17px;
    padding:11px 22px;border-radius:10px;margin-top:12px;display:inline-block;
  }
  a:hover{background:#f2c96a}
  @media(prefers-reduced-motion:reduce){.goat{animation:none}}
</style>
</head>
<body>
  <div class="goat">🐐</div>
  <h1>404</h1>
  <p>this goat wandered off the paddock.<br>whatever you were looking for isn't here.</p>
  <a href="/">back to the herd</a>
</body>
</html>
